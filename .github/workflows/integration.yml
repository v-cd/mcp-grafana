name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  test-integration:
    name: Test Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Start the Grafana server.
      # Do this early so that it can start up in time for the tests to run.
      # We may need to add a wait here.
      - name: Start docker-compose services
        uses: hoverkraft-tech/compose-action@3c795f9eb1db588146398cd8e4ab0fe98e0f92db
        with:
          compose-file: "docker-compose.yaml"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: Wait for Grafana API to be ready
        run: |
          set -euo pipefail
          ready=false
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Grafana is up"
              ready=true
              break
            fi
            echo "Waiting for Grafana... attempt $i"
            sleep 2
          done
          if [ "$ready" != "true" ]; then
            echo "Timed out waiting for Grafana to become ready"
            exit 1
          fi

      - name: Wait for datasources to be provisioned
        run: |
          set -euo pipefail
          ready=false
          for i in $(seq 1 60); do
            count="$(curl -fsS -u admin:admin http://localhost:3000/api/datasources 2>/dev/null | jq 'length' 2>/dev/null || echo 0)"
            echo "datasource count=$count"
            if [ "${count}" -ge 10 ]; then
              echo "Datasources provisioned"
              ready=true
              break
            fi
            sleep 2
          done
          if [ "$ready" != "true" ]; then
            echo "Timed out waiting for datasources to be provisioned"
            curl -fsS -u admin:admin http://localhost:3000/api/datasources || true
            exit 1
          fi

      - name: Wait for Graphite metrics to be queryable
        run: |
          set -euo pipefail
          # The graphite-seed container sends metrics and verifies they're
          # queryable before exiting. Wait for it to finish, then do a short
          # verification via Grafana's datasource proxy.
          echo "Waiting for graphite-seed container to finish..."
          exit_code=$(docker wait mcp-grafana-graphite-seed-1 2>/dev/null || echo "1")
          if [ "$exit_code" != "0" ]; then
            echo "graphite-seed failed (exit code $exit_code):"
            docker logs mcp-grafana-graphite-seed-1 2>&1 || true
            exit 1
          fi
          echo "graphite-seed completed successfully, verifying via Grafana proxy..."
          ready=false
          for i in $(seq 1 10); do
            count="$(curl -fsS -u admin:admin \
              'http://localhost:3000/api/datasources/proxy/uid/graphite/metrics/find?query=test.*' \
              2>/dev/null | jq 'length' 2>/dev/null || echo 0)"
            echo "Graphite test.* node count=$count"
            if [ "${count}" -ge 1 ]; then
              echo "Graphite metrics are seeded and queryable"
              ready=true
              break
            fi
            sleep 2
          done
          if [ "$ready" != "true" ]; then
            echo "Timed out waiting for Graphite metrics to be queryable"
            exit 1
          fi

      - name: Run integration tests
        run: make test-integration

  test-cloud:
    name: Test Cloud
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a53fc80bc30b0a16a262520465db899fa3af08b7 # get-vault-secrets/v1.3.2
        with:
          # Don't export secrets to $GITHUB_ENV for the whole job; consume them
          # from this step's `secrets` output only where needed (see below).
          export_env: false
          # Secrets placed in the ci/repo/grafana/mcp-grafana/<path> path in Vault
          repo_secrets: |
            GRAFANA_SERVICE_ACCOUNT_TOKEN=mcptests-grafana:api-key
            ASSERTS_GRAFANA_SERVICE_ACCOUNT_TOKEN=dev-grafana:api-key
            DATASOURCEDEV_GRAFANA_SERVICE_ACCOUNT_TOKEN=datasourcedev-grafana:api-key

      - name: Run cloud tests
        env:
          GRAFANA_URL: ${{ vars.CLOUD_GRAFANA_URL }}
          ASSERTS_GRAFANA_URL: ${{ vars.ASSERTS_GRAFANA_URL }}
          DATASOURCEDEV_GRAFANA_URL: ${{ vars.DATASOURCEDEV_GRAFANA_URL }}
          GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ fromJSON(steps.get-secrets.outputs.secrets).GRAFANA_SERVICE_ACCOUNT_TOKEN }}
          ASSERTS_GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ fromJSON(steps.get-secrets.outputs.secrets).ASSERTS_GRAFANA_SERVICE_ACCOUNT_TOKEN }}
          DATASOURCEDEV_GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ fromJSON(steps.get-secrets.outputs.secrets).DATASOURCEDEV_GRAFANA_SERVICE_ACCOUNT_TOKEN }}
        run: make test-cloud
